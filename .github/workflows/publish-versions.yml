# Publishes JSON snapshots into https://github.com/cantiksoh/release-index
# under versions/ (ide/, plugins/, platforms/, runtimes/, tools/).
#
# Setup:
# 1. Secret RELEASE_INDEX_PUSH_TOKEN: PAT with repo scope on cantiksoh/release-index
#    (fine-grained: Contents read+write on that repo only).
# 2. If the data repo is empty, add any initial commit once so clone works,
#    or the init path below will create main on first push.

name: Publish release index

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: release-index-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Restore HTTP response cache
        uses: actions/cache@v4
        with:
          path: .http-cache
          key: http-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.run_id }}
          restore-keys: |
            http-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            http-${{ runner.os }}-

      - run: npm ci
      - run: npm run build

      - name: Clone or init data repo
        env:
          TOKEN: ${{ secrets.RELEASE_INDEX_PUSH_TOKEN }}
        run: |
          set -e
          URL="https://x-access-token:${TOKEN}@github.com/cantiksoh/release-index.git"
          if git clone --depth 1 "$URL" data-repo 2>/dev/null; then
            echo "Cloned cantiksoh/release-index"
          else
            echo "Fresh init (empty or clone failed)"
            mkdir -p data-repo
            cd data-repo
            git init
            git remote add origin "$URL"
            git checkout -b main
          fi

      - name: Write version JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HTTP_CACHE_DIR: ${{ github.workspace }}/.http-cache
          HTTP_CACHE_TTL_MS: "86400000"
          SYNC_DELAY_MS: "250"
        run: node dist/sync.js --out data-repo/versions --continue-on-error

      - name: Commit and push
        env:
          TOKEN: ${{ secrets.RELEASE_INDEX_PUSH_TOKEN }}
        run: |
          set -e
          cd data-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          STAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(index): refresh snapshots (${STAMP})"
          git push -u origin HEAD:main
