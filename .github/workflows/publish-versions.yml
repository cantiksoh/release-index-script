# Publishes JSON snapshots into https://github.com/saiki-mbs/release-index
# under versions/ (ide/, plugins/, platforms/, runtimes/, tools/).
#
# Setup:
# 1. Secret RELEASE_INDEX_PUSH_TOKEN: PAT with repo scope on saiki-mbs/release-index
#    (fine-grained: Contents read+write on that repo only).
# 2. If the data repo is empty, add any initial commit once so clone works,
#    or the init path below will create master on first push.

name: Publish release index

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: release-index-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Restore HTTP response cache
        uses: actions/cache@v4
        with:
          path: .http-cache
          key: http-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.run_id }}
          restore-keys: |
            http-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            http-${{ runner.os }}-

      - run: npm ci
      - run: npm run build

      - name: Clone or init data repo
        env:
          TOKEN: ${{ secrets.RELEASE_INDEX_PUSH_TOKEN }}
        run: |
          set -e
          OWNER="saiki-mbs"
          REPO="release-index"

          # Create the target repo if it doesn't exist yet.
          # (Needed because `git clone` + pushing can't work when the repo is missing.)
          STATUS=$(
            curl -sS -o /dev/null -w "%{http_code}" \
              -H "Authorization: token ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}"
          )
          if [ "$STATUS" = "404" ]; then
            echo "Target repo missing; creating ${OWNER}/${REPO}..."
            CREATE_STATUS=$(
              curl -sS -o /dev/null -w "%{http_code}" \
                -X POST \
                -H "Authorization: token ${TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/orgs/${OWNER}/repos" \
                -d "{\"name\":\"${REPO}\",\"private\":false}"
            )
            if [ "$CREATE_STATUS" != "201" ]; then
              # Fallback: `cantiksoh` might be a user account, not an org.
              curl -sS -o /dev/null \
                -X POST \
                -H "Authorization: token ${TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/user/repos" \
                -d "{\"name\":\"${REPO}\",\"private\":false}"
            fi
          fi

          URL="https://x-access-token:${TOKEN}@github.com/saiki-mbs/release-index.git"
          if git clone --depth 1 "$URL" data-repo 2>/dev/null; then
            echo "Cloned saiki-mbs/release-index"
          else
            echo "Fresh init (empty or clone failed)"
            mkdir -p data-repo
            cd data-repo
            git init
            git remote add origin "$URL"
            git checkout -b master
          fi

      - name: Migrate WakaTime plugin layout (safe copy)
        run: node dist/migrate.js --repo data-repo --delete-old

      - name: Write version JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PROXY: ""
          GITHUB_PROXY: ""
          HTTP_CACHE_DIR: ${{ github.workspace }}/.http-cache
          HTTP_CACHE_TTL_MS: "86400000"
          SYNC_DELAY_MS: "250"
        run: node dist/sync.js --out data-repo --continue-on-error

      - name: Write repository README
        run: |
          cp templates/release-index-README.md data-repo/README.md
          UPDATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sed -i "s/{{LAST_UPDATED_UTC}}/${UPDATED_AT}/g" data-repo/README.md

      - name: Commit and push
        env:
          TOKEN: ${{ secrets.RELEASE_INDEX_PUSH_TOKEN }}
        run: |
          set -e
          cd data-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md ide plugins platforms runtimes tools meta
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          STAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(index): refresh snapshots (${STAMP})"
          git push -u origin HEAD:master
